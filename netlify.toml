# https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  command = "npm ci && npm run build"
  publish = "dist"

# SPA: send all routes to index.html (Vite client-side routing if used later)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
