# https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  command = "npm ci && npm run build"
  publish = "dist"

# SPA fallback. Netlify serves real files under publish/ first; this runs only when
# no file exists (e.g. client-only routes). Missing /models/**/*.glb still hits this
# and returns HTML — fix by ensuring Kenney assets are in public/ before build.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
